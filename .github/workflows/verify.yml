name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - run: npm audit --omit=dev

  rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo test --workspace
      - run: cargo test --workspace --release
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p alchemy-core --target wasm32-unknown-unknown --features wasm -- -D warnings
      - run: cargo build -p alchemy-core
      - run: >-
          cc -std=c11 -Wall -Wextra -Werror
          -Icrates/alchemy-core/include tests/c-api-smoke.c
          -Ltarget/debug -lalchemy_core -lm
          -Wl,-rpath,"$PWD/target/debug"
          -o target/c-api-smoke
      - run: target/c-api-smoke

  browser:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: cargo install wasm-pack --version 0.13.1 --locked
      - run: rustup target add wasm32-unknown-unknown
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
      - run: npm run test:e2e:prepared
      - run: npm run bundle:pages
      - run: npm run test:pages:prepared
      - if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  gpu:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.GPU_CI_AWS_ROLE_ARN }}
          aws-region: ${{ vars.GPU_CI_AWS_REGION }}

      - name: Start GPU runner
        run: >-
          aws ec2 start-instances
          --instance-ids '${{ vars.GPU_CI_INSTANCE_ID }}'

      - name: Wait for Systems Manager
        run: |
          aws ec2 wait instance-status-ok \
            --instance-ids '${{ vars.GPU_CI_INSTANCE_ID }}'
          for attempt in {1..60}; do
            status=$(aws ssm describe-instance-information \
              --filters Key=InstanceIds,Values='${{ vars.GPU_CI_INSTANCE_ID }}' \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text)
            if [[ "$status" == "Online" ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "GPU runner did not become available through Systems Manager." >&2
          exit 1

      - name: Run hardware WebGPU tests
        run: |
          command=$(cat <<'SCRIPT'
          set -eu
          install -d -o ubuntu -g ubuntu /home/ubuntu/lut-ci
          if [ -d /home/ubuntu/lut-ci/.git ]; then
            sudo -u ubuntu git -C /home/ubuntu/lut-ci fetch --force origin '${{ github.sha }}'
          else
            sudo -u ubuntu git clone --recursive https://github.com/breezewish/lut.git /home/ubuntu/lut-ci
          fi
          sudo -u ubuntu git -C /home/ubuntu/lut-ci checkout --detach '${{ github.sha }}'
          sudo -u ubuntu git -C /home/ubuntu/lut-ci submodule update --init --recursive
          sudo -u ubuntu bash -lc 'cd /home/ubuntu/lut-ci && npm ci'
          cd /home/ubuntu/lut-ci
          bash scripts/bootstrap-gpu-ci.sh
          sudo -iu ubuntu bash -lc 'cd /home/ubuntu/lut-ci && CI=1 bash scripts/run-gpu-ci.sh'
          SCRIPT
          )
          parameters=$(jq -nc --arg command "$command" '{commands:[$command]}')
          command_id=$(aws ssm send-command \
            --instance-ids '${{ vars.GPU_CI_INSTANCE_ID }}' \
            --document-name AWS-RunShellScript \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)
          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id '${{ vars.GPU_CI_INSTANCE_ID }}' \
              --query Status \
              --output text 2>/dev/null || true)
            if [[ -z "$status" ]]; then
              sleep 2
              continue
            fi
            if [[ "$status" != "Pending" && "$status" != "InProgress" && "$status" != "Delayed" ]]; then
              break
            fi
            sleep 10
          done
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id '${{ vars.GPU_CI_INSTANCE_ID }}'
          [[ "$status" == "Success" ]]

      - name: Stop GPU runner
        if: always()
        run: >-
          aws ec2 stop-instances
          --instance-ids '${{ vars.GPU_CI_INSTANCE_ID }}'

  deploy:
    if: github.event_name == 'push'
    needs: [quality, rust, browser, gpu]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
