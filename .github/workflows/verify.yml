name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - run: npm audit --omit=dev

  rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo test --workspace
      - run: cargo test --workspace --release
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p lutify-core --target wasm32-unknown-unknown --features wasm -- -D warnings
      - run: cargo build -p lutify-core
      - run: >-
          cc -std=c11 -Wall -Wextra -Werror
          -Icrates/lutify-core/include tests/c-api-smoke.c
          -Ltarget/debug -llutify_core -lm
          -Wl,-rpath,"$PWD/target/debug"
          -o target/c-api-smoke
      - run: target/c-api-smoke

  browser:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: Swatinem/rust-cache@v2

      - uses: actions/cache@v4
        with:
          path: tests/fixtures/webgpu-camera-matrix
          key: camera-fixtures-${{ hashFiles('tests/fixtures/webgpu-camera-matrix.json') }}

      - run: npm ci
      - run: cargo install wasm-pack --version 0.13.1 --locked
      - run: rustup target add wasm32-unknown-unknown
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
      - run: npm run test:e2e:ci:prepared
      - name: Verify WebGPU production paths with SwiftShader
        run: npm run test:webgpu-software:prepared
      - run: npm run bundle:pages
      - run: npm run test:pages:prepared
      - if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    needs: [quality, rust, browser]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
